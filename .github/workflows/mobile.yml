name: Mobile

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/mobile.yml"
  push:
    branches: [dev, main]
    paths:
      - "apps/mobile/**"

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @mixmatch/mobile lint

      - name: Test
        run: pnpm --filter @mixmatch/mobile test

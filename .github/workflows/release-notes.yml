name: Release Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      since_tag:
        description: 'Generate notes since this tag'
        required: false
        type: string
      workspace:
        description: 'Specific workspace (api, web, mobile, etc.)'
        required: false
        type: choice
        options:
          - api
          - web
          - mobile
          - stellar-service
          - packages

jobs:
  generate-release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Release Notes
        id: changelog
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Get previous tag
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREVIOUS_TAG" ]; then
              echo "No previous tag found, generating from beginning"
              node scripts/generate-changelog.js --output RELEASE_NOTES.md
            else
              echo "Generating since $PREVIOUS_TAG"
              node scripts/generate-changelog.js --since=$PREVIOUS_TAG --output RELEASE_NOTES.md
            fi
          else
            # Manual trigger
            SINCE_ARG="${{ inputs.since_tag }}"
            WORKSPACE_ARG="${{ inputs.workspace }}"
            
            CMD="node scripts/generate-changelog.js --output RELEASE_NOTES.md"
            if [ -n "$SINCE_ARG" ]; then
              CMD="$CMD --since=$SINCE_ARG"
            fi
            if [ -n "$WORKSPACE_ARG" ]; then
              CMD="$CMD --workspace=$WORKSPACE_ARG"
            fi
            
            $CMD
          fi

      - name: Display Release Notes
        run: cat RELEASE_NOTES.md

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 30

      - name: Summary
        run: |
          echo "## 📝 Release Notes Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release notes have been generated and attached to this workflow run." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Review the release notes in the 'Artifacts' section" >> $GITHUB_STEP_SUMMARY
          echo "- If triggered by tag push, a draft release has been created" >> $GITHUB_STEP_SUMMARY
          echo "- Publish the release when ready" >> $GITHUB_STEP_SUMMARY

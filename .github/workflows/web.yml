name: Web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web.yml"
  push:
    branches: [dev, main]
    paths:
      - "apps/web/**"
      - "packages/**"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec turbo run lint --filter=@mixmatch/web

      - name: Test
        run: pnpm exec turbo run test --filter=@mixmatch/web

      - name: Build
        run: pnpm exec turbo run build --filter=@mixmatch/web

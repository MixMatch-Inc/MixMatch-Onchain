services:
  mongo:
    image: mongo:7
    container_name: mixmatch-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: mixmatch
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mixmatch-api
    profiles: [api, full]
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - apps/api/.env
    volumes:
      - ./apps/api/src:/app/apps/api/src
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  stellar:
    build:
      context: .
      dockerfile: apps/stellar-service/Dockerfile
    container_name: mixmatch-stellar
    profiles: [stellar, full]
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - apps/stellar-service/.env
    volumes:
      - ./apps/stellar-service/src:/app/apps/stellar-service/src
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mixmatch-web
    profiles: [web, full]
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - apps/web/.env.local
    volumes:
      - ./apps/web/app:/app/apps/web/app
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
